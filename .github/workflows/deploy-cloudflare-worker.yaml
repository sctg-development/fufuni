name: CloudflareWorkerDeploy

on:
  push:
    branches:
      - main
    paths:
      - apps/merchant/**
      - package-lock.json
      - .github/workflows/deploy-cloudflare-worker.yaml

  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write
  packages: write
  attestations: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          submodules: "recursive"
          fetch-depth: 1

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"


      - name: Cache Turborepo
        uses: actions/cache@v5
        with:
          path: .turbo
          key: ${{ runner.os }}-turbo-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-turbo-

      - name: Install dependencies
        run: |
          npm install

      - name: Create .env file
        run: |
          echo -n ${{ secrets.AUTH0_AUDIENCE }} | sed -n 's/http.:\/\/\(.*\)/DOMAIN_NAME=\1\n/p' > .env
          echo "CRYPTOKEN=${{ secrets.CRYPTOKEN }}" >> .env
          echo "STORE_URL=${{ secrets.STORE_URL }}" >> .env
          echo "STORE_NAME=${{ secrets.STORE_NAME }}" >> .env
          echo "API_BASE_URL=${{ secrets.API_BASE_URL }}" >> .env
          echo "CORS_ORIGIN=${{ secrets.CORS_ORIGIN }}" >> .env

          echo "AUTHENTICATION_PROVIDER_TYPE=${{ secrets.AUTHENTICATION_PROVIDER_TYPE }}" >> .env
          echo "AUTH0_DOMAIN=${{ secrets.AUTH0_DOMAIN }}" >> .env
          echo "AUTH0_CLIENT_ID=${{ secrets.AUTH0_CLIENT_ID }}" >> .env
          echo "AUTH0_CLIENT_SECRET=${{ secrets.AUTH0_CLIENT_SECRET }}" >> .env
          echo "AUTH0_MANAGEMENT_API_CLIENT_ID=${{ secrets.AUTH0_MANAGEMENT_API_CLIENT_ID }}" >> .env
          echo "AUTH0_MANAGEMENT_API_CLIENT_SECRET=${{ secrets.AUTH0_MANAGEMENT_API_CLIENT_SECRET }}" >> .env
          echo "AUTH0_SCOPE=\"${{ secrets.AUTH0_SCOPE }}\"" >> .env
          echo "AUTH0_AUDIENCE=${{ secrets.AUTH0_AUDIENCE }}" >> .env

          echo "ADMIN_AUTH0_PERMISSION=${{ secrets.ADMIN_AUTH0_PERMISSION }}" >> .env
          echo "ADMIN_STORE_PERMISSION=${{ secrets.ADMIN_STORE_PERMISSION }}" >> .env
          echo "AUTH0_AUTOMATIC_PERMISSIONS=${{ secrets.AUTH0_AUTOMATIC_PERMISSIONS }}" >> .env
          echo "WANT_PERMISSION"=${{ secrets.WANT_PERMISSION }} >> .env
          echo "DATABASE_PERMISSION=${{ secrets.DATABASE_PERMISSION }}" >> .env
          echo "AI_PERMISSION=${{ secrets.AI_PERMISSION }}" >> .env
          echo "MAIL_PERMISSION=${{ secrets.MAIL_PERMISSION }}" >> .env

          echo "MERCHANT_PK=${{ secrets.MERCHANT_PK }}" >> .env
          echo "MERCHANT_SK=${{ secrets.MERCHANT_SK }}" >> .env
          echo "BACKUP_GPG=${{ secrets.BACKUP_GPG }}" >> .env
          echo "BACKUP_SSH=${{ secrets.BACKUP_SSH }}" >> .env
          echo "AUTH0_TEST_TOKEN=${{ secrets.AUTH0_TEST_TOKEN }}" >> .env
          echo "CLOUDFLARE_USE_PAGE_DEV_DOMAIN=${{ secrets.CLOUDFLARE_USE_PAGE_DEV_DOMAIN }}" >> .env
          echo "KV_CACHE_ID=${{ secrets.KV_CACHE_ID }}" >> .env
          
          echo "AI_API_KEY=${{ secrets.AI_API_KEY }}" >> .env
          echo "AI_MODEL=${{ secrets.AI_MODEL }}" >> .env
          echo "AI_API_URL=${{ secrets.AI_API_URL }}" >> .env
          
          echo "STRIPE_SECRET_KEY=${{ secrets.STRIPE_SECRET_KEY }}" >> .env
          echo "STRIPE_PUBLISHABLE_KEY=${{ secrets.STRIPE_PUBLISHABLE_KEY }}" >> .env
          echo "STRIPE_WEBHOOK_SECRET=${{ secrets.STRIPE_WEBHOOK_SECRET }}" >> .env

          echo "MAILGUN_USER=${{ secrets.MAILGUN_USER }}" >> .env
          echo "MAILGUN_API_KEY=${{ secrets.MAILGUN_API_KEY }}" >> .env
          echo "MAILGUN_DOMAIN=${{ secrets.MAILGUN_DOMAIN }}" >> .env
          echo "MAILGUN_BASE_URL=${{ secrets.MAILGUN_BASE_URL }}" >> .env
          
          echo "ORDER_TOKEN_SECRET=${{ secrets.ORDER_TOKEN_SECRET }}" >> .env
          

      - name: Ensure jq is installed
        run: |
          if ! command -v jq >/dev/null 2>&1; then
            sudo apt-get update
            sudo apt-get install -y jq
          fi

      - name: Update wrangler.jsonc using jq
        run: |
          cp .env apps/merchant/.env
          cd apps/merchant
          cp wrangler.jsonc wrangler.jsonc.bak
          set -a && source .env && set +a

          jq \
            --arg CRYPTOKEN "$CRYPTOKEN" \
            --arg AUTHENTICATION_PROVIDER_TYPE "$AUTHENTICATION_PROVIDER_TYPE" \
            --arg AUTH0_DOMAIN "$AUTH0_DOMAIN" \
            --arg AUTH0_CLIENT_ID "$AUTH0_CLIENT_ID" \
            --arg AUTH0_CLIENT_SECRET "$AUTH0_CLIENT_SECRET" \
            --arg AUTH0_SCOPE "$AUTH0_SCOPE" \
            --arg AUTH0_AUDIENCE "$AUTH0_AUDIENCE" \
            --arg API_BASE_URL "$API_BASE_URL" \
            --arg CORS_ORIGIN "$CORS_ORIGIN" \
            --arg ADMIN_AUTH0_PERMISSION "$ADMIN_AUTH0_PERMISSION" \
            --arg ADMIN_STORE_PERMISSION "$ADMIN_STORE_PERMISSION" \
            --arg AUTH0_MANAGEMENT_API_CLIENT_ID "$AUTH0_MANAGEMENT_API_CLIENT_ID" \
            --arg AUTH0_MANAGEMENT_API_CLIENT_SECRET "$AUTH0_MANAGEMENT_API_CLIENT_SECRET" \
            --arg AUTH0_AUTOMATIC_PERMISSIONS "$AUTH0_AUTOMATIC_PERMISSIONS" \
            --arg MERCHANT_PK "$MERCHANT_PK" \
            --arg MERCHANT_SK "$MERCHANT_SK" \
            --arg BACKUP_GPG "$BACKUP_GPG" \
            --arg BACKUP_SSH "$BACKUP_SSH" \
            --arg AUTH0_TEST_TOKEN "$AUTH0_TEST_TOKEN" \
            --arg CLOUDFLARE_USE_PAGE_DEV_DOMAIN "$CLOUDFLARE_USE_PAGE_DEV_DOMAIN" \
            --arg KV_CACHE_ID "$KV_CACHE_ID" \
            --arg WANT_PERMISSION "$WANT_PERMISSION" \
            --arg DATABASE_PERMISSION "$DATABASE_PERMISSION" \
            --arg AI_API_KEY "$AI_API_KEY" \
            --arg AI_MODEL "$AI_MODEL" \
            --arg AI_API_URL "$AI_API_URL" \
            --arg AI_PERMISSION "$AI_PERMISSION" \
            --arg STRIPE_SECRET_KEY "$STRIPE_SECRET_KEY" \
            --arg STRIPE_PUBLISHABLE_KEY "$STRIPE_PUBLISHABLE_KEY" \
            --arg STRIPE_WEBHOOK_SECRET "$STRIPE_WEBHOOK_SECRET" \
            --arg MAILGUN_USER "$MAILGUN_USER" \
            --arg MAILGUN_API_KEY "$MAILGUN_API_KEY" \
            --arg MAILGUN_DOMAIN "$MAILGUN_DOMAIN" \
            --arg MAILGUN_BASE_URL "$MAILGUN_BASE_URL" \
            --arg MAIL_PERMISSION "$MAIL_PERMISSION" \
            --arg ORDER_TOKEN_SECRET "$ORDER_TOKEN_SECRET" \
            --arg STORE_URL "$STORE_URL" \
            --arg STORE_NAME "$STORE_NAME" \
            --arg DOMAIN_NAME "$DOMAIN_NAME" \
            --argjson EMPTY '{}' \
            --arg USE_PAGE_DEV "$CLOUDFLARE_USE_PAGE_DEV_DOMAIN" \
            '(
              (.vars // {}) + {
                CRYPTOKEN: $CRYPTOKEN,
                AUTHENTICATION_PROVIDER_TYPE: $AUTHENTICATION_PROVIDER_TYPE,
                AUTH0_DOMAIN: $AUTH0_DOMAIN,
                AUTH0_CLIENT_ID: $AUTH0_CLIENT_ID,
                AUTH0_CLIENT_SECRET: $AUTH0_CLIENT_SECRET,
                AUTH0_SCOPE: $AUTH0_SCOPE,
                AUTH0_AUDIENCE: $AUTH0_AUDIENCE,
                API_BASE_URL: $API_BASE_URL,
                CORS_ORIGIN: $CORS_ORIGIN,
                ADMIN_AUTH0_PERMISSION: $ADMIN_AUTH0_PERMISSION,
                ADMIN_STORE_PERMISSION: $ADMIN_STORE_PERMISSION,
                AUTH0_MANAGEMENT_API_CLIENT_ID: $AUTH0_MANAGEMENT_API_CLIENT_ID,
                AUTH0_MANAGEMENT_API_CLIENT_SECRET: $AUTH0_MANAGEMENT_API_CLIENT_SECRET,
                AUTH0_AUTOMATIC_PERMISSIONS: $AUTH0_AUTOMATIC_PERMISSIONS,
                MERCHANT_PK: $MERCHANT_PK,
                MERCHANT_SK: $MERCHANT_SK,
                BACKUP_GPG: $BACKUP_GPG,
                BACKUP_SSH: $BACKUP_SSH,
                AUTH0_TEST_TOKEN: $AUTH0_TEST_TOKEN,
                CLOUDFLARE_USE_PAGE_DEV_DOMAIN: $CLOUDFLARE_USE_PAGE_DEV_DOMAIN,
                KV_CACHE_ID: $KV_CACHE_ID,
                WANT_PERMISSION: $WANT_PERMISSION,
                DATABASE_PERMISSION: $DATABASE_PERMISSION,
                AI_API_KEY: $AI_API_KEY,
                AI_MODEL: $AI_MODEL,
                AI_API_URL: $AI_API_URL,
                AI_PERMISSION: $AI_PERMISSION,
                STRIPE_SECRET_KEY: $STRIPE_SECRET_KEY,
                STRIPE_PUBLISHABLE_KEY: $STRIPE_PUBLISHABLE_KEY,
                STRIPE_WEBHOOK_SECRET: $STRIPE_WEBHOOK_SECRET,
                MAILGUN_USER: $MAILGUN_USER,
                MAILGUN_API_KEY: $MAILGUN_API_KEY,
                MAILGUN_DOMAIN: $MAILGUN_DOMAIN,
                MAILGUN_BASE_URL: $MAILGUN_BASE_URL,
                MAIL_PERMISSION: $MAIL_PERMISSION,
                ORDER_TOKEN_SECRET: $ORDER_TOKEN_SECRET,
                STORE_URL: $STORE_URL,
                STORE_NAME: $STORE_NAME
              }
            ) as $vars
            | ( .kv_namespaces[]? | select(.binding=="KV_CACHE") | .id ) = $KV_CACHE_ID
            | ( ($USE_PAGE_DEV | ascii_downcase) as $v
                | ($v == "" or $v == "false" or $v == "0") as $isFalsey
                | ($isFalsey | not) ) as $usingPageDev
            | if $usingPageDev then . else .routes = [{ pattern: $DOMAIN_NAME, custom_domain: true }] end
            | .vars = $vars
            ' wrangler.jsonc.bak > wrangler.jsonc

          cat wrangler.jsonc

      - name: Create an encrypted artifact with .env and wrangler.jsonc with CRYPTOKEN for debugging
        run: |
          tar -czf env_and_wrangler.tar.gz .env apps/merchant/wrangler.jsonc
          echo "env_and_wrangler.tar.gz created with .env and wrangler.jsonc"
          ls -l env_and_wrangler.tar.gz
          echo "Encrypting env_and_wrangler.tar.gz with CRYPTOKEN"
          openssl enc -aes-256-cbc -salt -in env_and_wrangler.tar.gz -out env_and_wrangler.tar.gz.enc -iter 10000  -pass pass:"${{ secrets.CRYPTOKEN }}"
          echo "Encrypted file env_and_wrangler.tar.gz.enc created"
          rm env_and_wrangler.tar.gz
          ls -l env_and_wrangler.tar.gz.enc
          echo "decrypt with: openssl enc -aes-256-cbc -d -salt -in env_and_wrangler.tar.gz.enc -out env_and_wrangler.tar.gz -iter 10000 -pass pass:\"<CRYPTOKEN  value>\""

      - name: Upload shared encrypted artifact
        uses: actions/upload-artifact@v6
        with:
          name: encrypted-env
          include-hidden-files: true
          path: env_and_wrangler.tar.gz.enc
          
      - name: Deploy
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: apps/merchant
          vars: |
            CRYPTOKEN
            AUTHENTICATION_PROVIDER_TYPE
            AUTH0_DOMAIN
            AUTH0_CLIENT_ID
            AUTH0_CLIENT_SECRET
            AUTH0_MANAGEMENT_API_CLIENT_ID
            AUTH0_MANAGEMENT_API_CLIENT_SECRET
            AUTH0_AUTOMATIC_PERMISSIONS
            AUTH0_SCOPE
            AUTH0_AUDIENCE
            API_BASE_URL
            CORS_ORIGIN
            ADMIN_AUTH0_PERMISSION
            DATABASE_PERMISSION
            ADMIN_STORE_PERMISSION
            AI_API_KEY
            AI_MODEL
            AI_API_URL
            AI_PERMISSION
            MERCHANT_PK
            MERCHANT_SK
            BACKUP_GPG
            BACKUP_SSH
            WANT_PERMISSION
            AUTH0_TEST_TOKEN
            CLOUDFLARE_USE_PAGE_DEV_DOMAIN
            KV_CACHE_ID
            STRIPE_SECRET_KEY
            STRIPE_PUBLISHABLE_KEY
            STRIPE_WEBHOOK_SECRET
            MAILGUN_USER
            MAILGUN_API_KEY
            MAILGUN_DOMAIN
            MAILGUN_BASE_URL
            MAIL_PERMISSION
            ORDER_TOKEN_SECRET
            STORE_URL
            STORE_NAME

        env:
          CRYPTOKEN: ${{ secrets.CRYPTOKEN }}
          AUTHENTICATION_PROVIDER_TYPE: ${{ secrets.AUTHENTICATION_PROVIDER_TYPE }}
          AUTH0_DOMAIN: ${{ secrets.AUTH0_DOMAIN }}
          AUTH0_CLIENT_ID: ${{ secrets.AUTH0_CLIENT_ID }}
          AUTH0_CLIENT_SECRET: ${{ secrets.AUTH0_CLIENT_SECRET }}
          AUTH0_MANAGEMENT_API_CLIENT_ID: ${{ secrets.AUTH0_MANAGEMENT_API_CLIENT_ID }}
          AUTH0_MANAGEMENT_API_CLIENT_SECRET: ${{ secrets.AUTH0_MANAGEMENT_API_CLIENT_SECRET }}
          AUTH0_AUTOMATIC_PERMISSIONS: ${{ secrets.AUTH0_AUTOMATIC_PERMISSIONS }}
          AUTH0_SCOPE: ${{ secrets.AUTH0_SCOPE }}
          AUTH0_AUDIENCE: ${{ secrets.AUTH0_AUDIENCE }}
          API_BASE_URL: ${{ secrets.API_BASE_URL }}
          CORS_ORIGIN: ${{ secrets.CORS_ORIGIN }}
          ADMIN_AUTH0_PERMISSION: ${{ secrets.ADMIN_AUTH0_PERMISSION }}
          ADMIN_STORE_PERMISSION: ${{ secrets.ADMIN_STORE_PERMISSION }}
          DATABASE_PERMISSION: ${{ secrets.DATABASE_PERMISSION }}
          MERCHANT_PK: ${{ secrets.MERCHANT_PK }}
          MERCHANT_SK: ${{ secrets.MERCHANT_SK }}
          BACKUP_GPG: ${{ secrets.BACKUP_GPG }}
          BACKUP_SSH: ${{ secrets.BACKUP_SSH }}
          AUTH0_TEST_TOKEN: ${{ secrets.AUTH0_TEST_TOKEN }}
          CLOUDFLARE_USE_PAGE_DEV_DOMAIN: ${{ secrets.CLOUDFLARE_USE_PAGE_DEV_DOMAIN }}
          KV_CACHE_ID: ${{ secrets.KV_CACHE_ID }}
          TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
          TURBO_TEAM: ${{ vars.TURBO_TEAM }}
          WANT_PERMISSION: ${{ secrets.WANT_PERMISSION }}
          AI_API_KEY: ${{ secrets.AI_API_KEY }}
          AI_MODEL: ${{ secrets.AI_MODEL }}
          AI_API_URL: ${{ secrets.AI_API_URL }}
          AI_PERMISSION: ${{ secrets.AI_PERMISSION }}
          STRIPE_SECRET_KEY: ${{ secrets.STRIPE_SECRET_KEY }}
          STRIPE_PUBLISHABLE_KEY: ${{ secrets.STRIPE_PUBLISHABLE_KEY }}
          STRIPE_WEBHOOK_SECRET: ${{ secrets.STRIPE_WEBHOOK_SECRET }}
          MAILGUN_USER: ${{ secrets.MAILGUN_USER }}
          MAILGUN_API_KEY: ${{ secrets.MAILGUN_API_KEY }}
          MAILGUN_DOMAIN: ${{ secrets.MAILGUN_DOMAIN }}
          MAILGUN_BASE_URL: ${{ secrets.MAILGUN_BASE_URL }}
          MAIL_PERMISSION: ${{ secrets.MAIL_PERMISSION }}
          ORDER_TOKEN_SECRET: ${{ secrets.ORDER_TOKEN_SECRET }}
          STORE_URL: ${{ secrets.STORE_URL }}
          STORE_NAME: ${{ secrets.STORE_NAME }}
