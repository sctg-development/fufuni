name: CloudflareWorkerDeploy

on:
  push:
    branches:
      - main
    paths:
      - apps/merchant/**
      - package-lock.json
      - .github/workflows/deploy-cloudflare-worker.yaml
      - .github/workflows/create-env-artifact.yaml

  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write
  packages: write
  attestations: write

jobs:
  create-env:
    uses: ./.github/workflows/create-env-artifact.yaml
    secrets: inherit

  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          submodules: "recursive"
          fetch-depth: 1

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"


      - name: Cache Turborepo
        uses: actions/cache@v5
        with:
          path: .turbo
          key: ${{ runner.os }}-turbo-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-turbo-

      - name: Install dependencies
        run: |
          npm install

      - name: Download shared .env artifact
        uses: actions/download-artifact@v5
        with:
          name: shared-env
          path: .

      # .env.enc was encrypted with openssl enc -aes-256-cbc -salt -in env_and_wrangler.tar.gz -out .env.enc -iter 10000 -pass pass:"${{ secrets.CRYPTOKEN }}"
      # Decrypt it using the same key and parameters
      - name: Decrypt .env + wrangler.jsonc artifact
        run: |
          openssl enc -aes-256-cbc -d -salt -in .env.enc -out env_and_wrangler.tar.gz -iter 10000 -pass pass:"${{ secrets.CRYPTOKEN }}"
          tar -xzvf env_and_wrangler.tar.gz
          rm env_and_wrangler.tar.gz .env.enc
          if [ ! -f .env ]; then
            echo "Decrypted artifact does not contain .env"
            exit 1
          fi
          if [ ! -f apps/merchant/wrangler.jsonc ]; then
            echo "Decrypted artifact does not contain apps/merchant/wrangler.jsonc"
            exit 1
          fi
          if ! grep -q "AUTH0_DOMAIN=${{ secrets.AUTH0_DOMAIN }}" .env; then
            echo "Decrypted .env file does not contain expected AUTH0_DOMAIN value"
            exit 1
          fi

      - name: Set Wrangler secrets in bulk from secrets.json
        run: |
          cd apps/merchant
          npx wrangler secret bulk < secrets.json

      - name: Create an encrypted artifact with .env and wrangler.jsonc with CRYPTOKEN for debugging
        run: |
          tar -czf env_and_wrangler.tar.gz .env apps/merchant/wrangler.jsonc
          echo "env_and_wrangler.tar.gz created with .env and wrangler.jsonc"
          ls -l env_and_wrangler.tar.gz
          echo "Encrypting env_and_wrangler.tar.gz with CRYPTOKEN"
          openssl enc -aes-256-cbc -salt -in env_and_wrangler.tar.gz -out env_and_wrangler.tar.gz.enc -iter 10000  -pass pass:"${{ secrets.CRYPTOKEN }}"
          echo "Encrypted file env_and_wrangler.tar.gz.enc created"
          rm env_and_wrangler.tar.gz
          ls -l env_and_wrangler.tar.gz.enc
          echo "decrypt with: openssl enc -aes-256-cbc -d -salt -in env_and_wrangler.tar.gz.enc -out env_and_wrangler.tar.gz -iter 10000 -pass pass:\"<CRYPTOKEN  value>\""

      - name: Upload shared encrypted artifact
        uses: actions/upload-artifact@v6
        with:
          name: encrypted-env
          include-hidden-files: true
          path: env_and_wrangler.tar.gz.enc
          
      - name: Deploy
        uses: cloudflare/wrangler-action@v3
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: apps/merchant